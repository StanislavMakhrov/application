services:
  app:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - gruenbilanz_pgdata:/var/lib/postgresql/data
    depends_on:
      - tesseract
    environment:
      - DATABASE_URL=postgresql://gruenbilanz:gruenbilanz@localhost:5432/gruenbilanz
      - TESSERACT_URL=http://tesseract:3001
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/entries?type=profile"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  tesseract:
    build:
      context: ./docker/tesseract
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  gruenbilanz_pgdata:


