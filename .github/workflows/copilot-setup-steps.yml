name: Copilot Setup Steps

# This workflow customizes the GitHub Copilot coding agent environment
# It runs before the agent starts working to set up tools
# Documentation: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # NOTE: The permissions block here does NOT control the Copilot agent's ghu_ OAuth
    # token. The Copilot agent always uses a GitHub App user-to-server token whose
    # permissions are governed by the Copilot App installation — not this block.
    # This block only scopes the GITHUB_TOKEN for the setup steps themselves.
    permissions:
      contents: write
      pull-requests: write

    # RELEASE_TOKEN is a classic PAT (repo + workflow scopes). It is exposed here so
    # the agent can use it via scripts/pr-github.sh to push code and create pull
    # requests. The built-in ghu_ Copilot token cannot create PRs programmatically
    # (returns "Resource not accessible by integration"), whereas a classic PAT can.
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install app dependencies
        working-directory: src
        run: npm ci || echo "No package-lock.json yet; skipping npm ci"

      - name: Install Playwright and e2e test dependencies
        # Install Playwright so the agent can run e2e tests locally with --e2e flag
        working-directory: e2e-tests
        run: |
          if [ -f package.json ]; then
            npm ci
            npx playwright install --with-deps chromium
          fi

      - name: Set up Docker Buildx
        # Buildx is required to replicate the multi-platform build used in PR Validation.
        # The agent uses this to run `scripts/docker-build-test.sh` locally before pushing.
        uses: docker/setup-buildx-action@v4

      - name: Setup complete
        run: |
          echo "✓ GitHub Copilot coding agent environment ready"
          echo "  - Node.js: $(node --version)"
          echo "  - npm: $(npm --version)"
          echo "  - Docker: $(docker --version)"
          echo "  - Docker Buildx: $(docker buildx version)"
