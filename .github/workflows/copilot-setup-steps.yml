name: Copilot Setup Steps

# This workflow customizes the GitHub Copilot coding agent environment
# It runs before the agent starts working to set up tools
# Documentation: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: write
  pull-requests: write

# Expose RELEASE_TOKEN as GH_TOKEN so the Copilot agent can create pull requests.
# The agent's default ghu_ OAuth token is subject to the repository policy
# "Allow GitHub Actions to create and approve pull requests" and will receive a 403
# if that policy is disabled. A classic PAT (RELEASE_TOKEN) bypasses this restriction.
#
# Setup: Add RELEASE_TOKEN (classic PAT with repo scope) to repository secrets.
# See: .github/COPILOT-SETUP.md § Troubleshooting
env:
  GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Verify GH_TOKEN for PR creation
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️  GH_TOKEN is not set — RELEASE_TOKEN secret is missing."
            echo "   The Copilot agent will fall back to its default ghu_ OAuth token"
            echo "   which may fail to create pull requests (403 Resource not accessible by integration)."
            echo "   See .github/COPILOT-SETUP.md § Troubleshooting for setup instructions."
          else
            echo "✓ GH_TOKEN is set via RELEASE_TOKEN — PR creation will work correctly."
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install app dependencies
        working-directory: src
        run: npm ci || echo "No package-lock.json yet; skipping npm ci"

      - name: Install Playwright and e2e test dependencies
        # Install Playwright so the agent can run e2e tests locally with --e2e flag
        working-directory: e2e-tests
        run: |
          if [ -f package.json ]; then
            npm ci
            npx playwright install --with-deps chromium
          fi

      - name: Set up Docker Buildx
        # Buildx is required to replicate the multi-platform build used in PR Validation.
        # The agent uses this to run `scripts/docker-build-test.sh` locally before pushing.
        uses: docker/setup-buildx-action@v4

      - name: Setup complete
        run: |
          echo "✓ GitHub Copilot coding agent environment ready"
          echo "  - Node.js: $(node --version)"
          echo "  - npm: $(npm --version)"
          echo "  - Docker: $(docker --version)"
          echo "  - Docker Buildx: $(docker buildx version)"
