name: PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image for UAT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Guardrail: internal/workflow PRs must not bump versions"
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if [ -z "$changed_files" ]; then
            echo "No changed files detected; skipping internal commit guardrail."
            exit 0
          fi

          # If anything outside these paths changed, this is not an internal-only PR.
          non_internal=$(echo "$changed_files" | grep -Ev '^(\.github/|scripts/|docs/)' || true)
          if [ -n "$non_internal" ]; then
            echo "Non-internal files changed; internal commit guardrail not applicable."
            exit 0
          fi

          echo "Internal-only PR detected; enforcing non-version-bumping commit types."

          # Versionize bumps on conventional commits like feat/fix (and breaking changes).
          messages=$(git log --format=%B "$BASE_SHA".."$HEAD_SHA" || true)

          if echo "$messages" | grep -Eqi '^(feat|fix|perf)(\([^)]*\))?:|BREAKING CHANGE:'; then
            echo "❌ ERROR: This PR only changes internal/workflow/tooling files, but includes version-bumping commits (feat/fix/perf or BREAKING CHANGE)."
            echo "Please use non-bumping types like chore:, ci:, docs:, style:, refactor: for internal changes."
            exit 1
          fi

          echo "✓ Commit messages OK for internal-only PR."

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No Dockerfile found — skipping Docker build."
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name and short SHA
        id: repo
        run: |
          echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./src
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}

      - name: UAT instructions
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          IMAGE="ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}"
          # Generate unique credentials for this run
          UAT_EMAIL="uat-pr${{ github.event.pull_request.number }}-$(date +%s)@gruenbilanz.de"
          UAT_PASSWORD="$(openssl rand -base64 18 | tr -d '+/=' | head -c 20)"
          {
            echo "## 🐳 UAT — Docker image ready"
            echo ""
            echo "Pull and run the image to verify this PR locally:"
            echo ""
            echo '```bash'
            echo "docker run --rm -p 3000:3000 ${IMAGE}"
            echo '```'
            echo ""
            echo "Then open **http://localhost:3000** in your browser."
            echo ""
            echo "### 🔑 Credentials"
            echo ""
            echo "**Demo mode** (no Supabase env vars set — default for this image):"
            echo "No login required — the app redirects directly to \`/onboarding\`."
            echo ""
            echo "**Production mode** (when Supabase env vars are configured):"
            echo "Register a new account at \`/register\` using the generated credentials below,"
            echo "or create this user in your Supabase project via *Authentication → Users → Add user*."
            echo ""
            echo "| Field    | Value |"
            echo "| -------- | ----- |"
            echo "| Email    | \`${UAT_EMAIL}\` |"
            echo "| Password | \`${UAT_PASSWORD}\` |"
            echo ""
            echo "> The tag includes the commit SHA to ensure Docker always pulls the latest image."
          } | tee -a "$GITHUB_STEP_SUMMARY"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No Dockerfile found — skipping smoke tests."
          fi

      - name: Set lowercase repository name and short SHA
        if: steps.dockerfile_check.outputs.exists == 'true'
        id: repo
        run: |
          echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          IMAGE="ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}"
          docker pull "$IMAGE"
          echo "SMOKE_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Start Docker container
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          docker run -d --name app-smoke -p 3000:3000 "$SMOKE_IMAGE"

      - name: Wait for app to be ready
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          echo "Waiting for app to be ready at http://localhost:3000 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "✅ App is ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet, retrying in 3 s..."
            sleep 3
          done
          echo "❌ App failed to start within 90 s — container logs:"
          docker logs green-ledger-smoke
          exit 1

      - name: Set up Python
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Chrome
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: browser-actions/setup-chrome@v2

      - name: Install Python smoke-test dependencies
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: pip install -r smoke-tests/requirements.txt

      - name: Run smoke tests
        if: steps.dockerfile_check.outputs.exists == 'true'
        env:
          BASE_URL: http://localhost:3000
        run: pytest smoke-tests/ -v --tb=short

      - name: Stop Docker container
        if: always() && steps.dockerfile_check.outputs.exists == 'true'
        run: |
          docker stop app-smoke || true
          docker rm app-smoke || true

      - name: Skip smoke tests (no Dockerfile)
        if: steps.dockerfile_check.outputs.exists == 'false'
        run: echo "✅ Smoke tests skipped (no Dockerfile)"
